<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Prode - Campeón</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            font-size: 20px;
            pointer-events: none;
            animation: fall 3s linear forwards;
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .trophy {
            font-size: 60px;
            margin-bottom: 10px;
            animation: bounce 0.6s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 5px;
            font-weight: 700;
        }
        
        .champion-badge {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8c42 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: 700;
            margin: 15px 0;
            display: inline-block;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
        
        .ranking {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .rank-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 12px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }
        
        .rank-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .rank-item.top1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-left-color: #ffd700;
            padding: 30px;
            transform: scale(1.15);
            transform-origin: left;
            margin: 20px 0;
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0%, 100% {
                box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
            }
            50% {
                box-shadow: 0 15px 50px rgba(255, 215, 0, 0.8);
            }
        }
        
        .rank-item.separator {
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            padding: 0;
            margin: 15px 0;
            border-left: none;
        }
        
        .rank-item.top2 {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            border-left-color: #c0c0c0;
        }
        
        .rank-item.top3 {
            background: linear-gradient(135deg, #cd7f32 0%, #e8a76a 100%);
            border-left-color: #cd7f32;
        }
        
        .position {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            min-width: 40px;
        }
        
        .rank-item.top1 .position,
        .rank-item.top2 .position,
        .rank-item.top3 .position {
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .rank-item.top1 .position {
            font-size: 28px;
        }
        
        .name {
            flex: 1;
            margin: 0 15px;
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }
        
        .rank-item.top1 .name {
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            font-size: 20px;
            font-weight: 700;
        }
        
        .rank-item.top2 .name,
        .rank-item.top3 .name {
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .points {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
            min-width: 50px;
            text-align: right;
        }
        
        .rank-item.top1 .points {
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            font-size: 28px;
        }
        
        .rank-item.top2 .points,
        .rank-item.top3 .points {
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            color: #667eea;
            font-size: 14px;
            font-weight: 700;
